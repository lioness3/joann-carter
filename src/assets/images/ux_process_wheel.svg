<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>UX Design Process</title>
  <desc>7-step circular UX design process: Listen &amp; Empathize, Research Metrics, Ideate User Needs, Analyze Competitors, Discover Opportunities, Prototype, Test</desc>

  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
  </style>

  <!-- Arcs (center + gap/2 → center + sliceDeg - gap/2, sliceDeg=51.43°, gap=14°) -->
  <path d="M 364.4 141.5 A 200 200 0 0 1 480.0 197.2" fill="none" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
  <path d="M 510.5 235.5 A 200 200 0 0 1 538.9 360.4" fill="none" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
  <path d="M 528.3 408.0 A 200 200 0 0 1 448.0 508.3" fill="none" stroke="#0891b2" stroke-width="6" stroke-linecap="round"/>
  <path d="M 404.5 529.3 A 200 200 0 0 1 276.2 529.6" fill="none" stroke="#059669" stroke-width="6" stroke-linecap="round"/>
  <path d="M 232.0 508.3 A 200 200 0 0 1 152.1 408.4" fill="none" stroke="#ca8a04" stroke-width="6" stroke-linecap="round"/>
  <path d="M 141.2 360.4 A 200 200 0 0 1 169.5 235.5" fill="none" stroke="#ea580c" stroke-width="6" stroke-linecap="round"/>
  <path d="M 199.8 197.3 A 200 200 0 0 1 315.1 141.6" fill="none" stroke="#e11d48" stroke-width="6" stroke-linecap="round"/>

  <!--
    Inner hub: light blue-gray rings that contrast against both
    light (#ffffff) and dark (#2d3543) backgrounds.
    #dce4f0 / #eef2f8 are clearly visible on dark bg, subtle on light bg.
    Dark navy text (#112240) on these rings = ~13.5:1 contrast ratio.
  -->
  <circle cx="340" cy="340" r="105" fill="#dce4f0" stroke="#b8c8de" stroke-width="1"/>
  <circle cx="340" cy="340" r="86"  fill="#eef2f8" stroke="#ccd8e8" stroke-width="0.5"/>

  <text x="340" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#112240">UX Design</text>
  <text x="340" y="350" text-anchor="middle" font-size="14" font-weight="500" fill="#112240">Process</text>
  <text x="340" y="370" text-anchor="middle" font-size="11" fill="#4a6080">Human-centered</text>

  <!-- Node 0: Listen & Empathize -->
  <circle cx="340.0" cy="140.0" r="44" fill="#7c3aed" stroke="white" stroke-width="2"/>
  <text x="340.0" y="133.0" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Listen &amp;</text>
  <text x="340.0" y="149.0" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Empathize</text>
  <text x="340.0" y="82.0"  text-anchor="middle" font-size="10" fill="#7c3aed" opacity="0.7">01</text>

  <!-- Node 1: Research Metrics -->
  <circle cx="496.4" cy="215.3" r="44" fill="#2563eb" stroke="white" stroke-width="2"/>
  <text x="496.4" y="208.3" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Research</text>
  <text x="496.4" y="224.3" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Metrics</text>
  <text x="544.8" y="180.6" text-anchor="middle" font-size="10" fill="#2563eb" opacity="0.7">02</text>

  <!-- Node 2: Ideate User Needs -->
  <circle cx="535.0" cy="384.5" r="44" fill="#0891b2" stroke="white" stroke-width="2"/>
  <text x="535.0" y="377.5" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Ideate</text>
  <text x="535.0" y="393.5" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">User Needs</text>
  <text x="595.4" y="402.3" text-anchor="middle" font-size="10" fill="#0891b2" opacity="0.7">03</text>

  <!-- Node 3: Analyze Competitors -->
  <circle cx="426.7" cy="520.2" r="44" fill="#059669" stroke="white" stroke-width="2"/>
  <text x="426.7" y="513.2" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Analyze</text>
  <text x="426.7" y="529.2" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Competitors</text>
  <text x="453.6" y="580.1" text-anchor="middle" font-size="10" fill="#059669" opacity="0.7">04</text>

  <!-- Node 4: Discover Opportunities -->
  <circle cx="253.3" cy="520.2" r="44" fill="#ca8a04" stroke="white" stroke-width="2"/>
  <text x="253.3" y="513.2" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Discover</text>
  <text x="253.3" y="529.2" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Opportunities</text>
  <text x="226.4" y="580.1" text-anchor="middle" font-size="10" fill="#ca8a04" opacity="0.7">05</text>

  <!-- Node 5: Prototype -->
  <circle cx="145.0" cy="384.5" r="44" fill="#ea580c" stroke="white" stroke-width="2"/>
  <text x="145.0" y="389.5" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Prototype</text>
  <text x="84.6"  y="402.3" text-anchor="middle" font-size="10" fill="#ea580c" opacity="0.7">06</text>

  <!-- Node 6: Test -->
  <circle cx="183.6" cy="215.3" r="44" fill="#e11d48" stroke="white" stroke-width="2"/>
  <text x="183.6" y="220.3" text-anchor="middle" font-size="11.5" font-weight="500" fill="white">Test</text>
  <text x="135.2" y="180.6" text-anchor="middle" font-size="10" fill="#e11d48" opacity="0.7">07</text>

</svg>
